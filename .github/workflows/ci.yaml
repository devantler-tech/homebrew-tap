---
name: CI

on:
  # Audit Cask-bump PRs on the draft→ready flip, not at draft-open. GoReleaser opens the release
  # Cask PRs (`goreleaser/*`) as drafts ~37 min before the GitHub release publishes (it stays a
  # draft until every release job succeeds), and the ksail `homebrew` job marks them ready only
  # AFTER publish. So `ready_for_review` here — plus the `audit-casks` draft-skip below — lets
  # `brew audit --online` resolve a live asset on the first try: no pre-publish 404, no manual
  # re-audit. Same triggers and draft handling as the org `enable-auto-merge.yaml`.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

jobs:
  audit-casks:
    name: 🔍 Audit Casks
    # Skip drafts: a draft release Cask PR's asset is not public yet, so `brew audit --online` would
    # 404 and wedge the PR red (the failure this removes). It re-runs on `ready_for_review` once the
    # asset is live — see the trigger comment. `merge_group` and non-draft PRs always audit.
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    # macOS has Homebrew preinstalled; Casks run on macOS so audit them there.
    runs-on: macos-latest
    permissions:
      contents: read # checkout
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # brew audit --online fetches the release assets
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # read-only job; never pushes
      - name: 🧪 Self-test — the gate must reject a broken Cask
        # Regression guard: prove the audit gate actually blocks, not just that it
        # runs. Build a deliberately-broken Cask in a throwaway tap and assert
        # `brew audit` rejects it; if it ever PASSES, the gate has silently stopped
        # enforcing and we fail the job. Offline (no `--online`) so it is
        # deterministic and needs no network or token — the broken Cask trips
        # offline-detectable rules (missing homepage/desc/artifact, bad sha256).
        run: |
          set -euo pipefail
          selftap="$(brew --repository)/Library/Taps/devantler-tech-selftest/homebrew-selftest"
          mkdir -p "$selftap/Casks"
          cleanup() { rm -rf "$selftap"; }
          trap cleanup EXIT
          cat > "$selftap/Casks/broken-selftest.rb" <<'RUBY'
          cask "broken-selftest" do
            version "0.0.0"
            sha256 "deadbeef"
            url "https://example.invalid/broken-selftest/nope.zip"
            name "broken selftest"
          end
          RUBY
          if brew audit --strict --cask "devantler-tech-selftest/selftest/broken-selftest"; then
            echo "::error::Self-test failed: a deliberately-broken Cask passed audit — the gate is not enforcing."
            exit 1
          fi
          echo "Self-test OK: the broken Cask was correctly rejected by brew audit."
      - name: 🔍 brew audit --strict --online (every Cask)
        # `brew audit` only accepts a Cask *name* (the path form is disabled), so
        # expose this checkout to Homebrew as the real tap via a symlink, then
        # audit each Cask by `<tap>/<name>`. `--online` resolves url + sha256 and
        # the verified-domain rule; `--strict` turns style/quality warnings into
        # failures. Auditing every Cask means adding a third "just works".
        env:
          # `--online` hits the GitHub API to resolve release assets; without a
          # token brew uses the unauthenticated limit (60/hr per runner IP, shared
          # across all Actions runners on that IP) and intermittently fails with
          # "API rate limit exceeded", flakily blocking every PR. The job token
          # raises this to 5,000/hr. Read-only; matches the `contents: read` scope.
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tap_dir="$(brew --repository)/Library/Taps/devantler-tech/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sfn "$GITHUB_WORKSPACE" "$tap_dir"
          status=0
          for cask in Casks/*.rb; do
            name="$(basename "$cask" .rb)"
            echo "::group::brew audit $name"
            brew audit --strict --online --cask "devantler-tech/tap/$name" || status=1
            echo "::endgroup::"
          done
          exit "$status"

  required-checks:
    name: CI - Required Checks
    if: always()
    runs-on: ubuntu-latest
    needs: [audit-casks]
    permissions: {}
    steps:
      - name: ✅ Aggregate job checks
        uses: devantler-tech/actions/aggregate-job-checks@0e1232924bf8b07a40b1b24e13e200744fbabcfa # v6.0.0
        with:
          job-results: ${{ needs.audit-casks.result }}
