---
name: CI

on:
  pull_request:
  merge_group:

permissions: {}

jobs:
  required-checks:
    name: CI - Required Checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Aggregate job checks
        uses: devantler-tech/actions/aggregate-job-checks@7dbc3c310c46eb51b0f298de2de0e2d9c6552eae # v4.0.0
        with:
          job-results: ""
