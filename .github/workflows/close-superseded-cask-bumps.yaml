name: Close superseded Cask bumps

# GoReleaser opens a release Cask-bump PR (`goreleaser/<cask>-v<version>`) as a draft for every tool
# release and the ksail `homebrew` job flips it ready after publish. When a newer release ships before
# an older draft is merged, the older one is left behind as a stale draft that lingers in the PR list
# (see homebrew-tap#848). This job reconciles that: for each Cask it closes every open
# `goreleaser/<cask>-v*` PR whose version is at-or-below the version already on `main` (superseded or
# redundant) and deletes its branch, while keeping any genuinely-newer pending bump. It runs after a
# bump lands on `main`, daily as a safety net, and on demand.
on:
  push:
    branches: [main]
    paths: ["Casks/**"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: close-superseded-cask-bumps
  cancel-in-progress: false

jobs:
  close-superseded:
    name: 🧹 Close superseded Cask bumps
    runs-on: ubuntu-latest
    permissions:
      contents: write # delete the head branch of a superseded PR
      pull-requests: write # close superseded PRs
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # the gh API calls below reach api.github.com
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # read-only checkout; the script authenticates gh via GH_TOKEN
      - name: 🧹 Close superseded Cask-bump PRs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for cask in Casks/*.rb; do
            name="$(basename "$cask" .rb)"
            # The Cask's current version on main — the supersession watermark.
            current="$(grep -m1 -E '^[[:space:]]*version[[:space:]]+"' "$cask" \
              | sed -E 's/.*version[[:space:]]+"([^"]+)".*/\1/')"
            if [ -z "$current" ]; then
              echo "::warning::Could not read version from $cask — skipping $name"
              continue
            fi
            echo "::group::$name (main is at v$current)"
            # All open release-bump PRs for THIS cask. The `-v[0-9]` anchor disambiguates
            # `ksail` from `ksail-desktop` (the latter has `-desktop-` before `-v`).
            prefix="goreleaser/${name}-v"
            while IFS=$'\t' read -r num branch; do
              [ -n "$num" ] || continue
              # Quote the prefix so `#` strips it literally (SC2295), not as a glob pattern.
              ver="${branch#"$prefix"}"
              # Keep a genuinely-newer pending bump; close anything at-or-below main. The version
              # comparison lives in scripts/is-superseded.sh (exit 0 = superseded → close) so the
              # destructive close/keep decision has a single, test-covered source of truth
              # (test/is-superseded.test.sh).
              if bash "$GITHUB_WORKSPACE/scripts/is-superseded.sh" "$ver" "$current"; then
                echo "Closing #$num ($branch) — superseded by v$current on main"
                # Build the body with printf so no YAML indentation leaks into the markdown.
                body="$(printf '%s\n\n%s\n' \
                  "> 🤖 Generated by the Daily AI Assistant" \
                  "\`$name\` is already at \`v$current\` on \`main\`, so this \`v$ver\` bump is superseded. Closing automatically and deleting the branch (homebrew-tap#848). Release Casks are kept current by the GoReleaser bump pipeline — no manual action needed.")"
                gh pr close "$num" --delete-branch --comment "$body"
              else
                echo "Keeping #$num ($branch) — newer than v$current on main"
              fi
            done < <(gh pr list --state open --limit 100 \
              --json number,headRefName \
              --jq ".[] | select(.headRefName | test(\"^goreleaser/${name}-v[0-9]\")) | [.number, .headRefName] | @tsv")
            echo "::endgroup::"
          done
