name: Sync labels
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: devantler-tech/actions/sync-github-labels@538d7103ed24531647941b3a460393b5ac7ed756 # v2.2.0
